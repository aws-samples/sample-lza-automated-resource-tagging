  # ============================================================
  # Retroactive Backfill (conditional)
  # ============================================================

  RetroactiveLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: RetroactiveTaggingEnabled
    Properties:
      LogGroupName: !Sub /aws/lambda/${LambdaFunctionName}-backfill
      RetentionInDays: 90
      KmsKeyId: !GetAtt EncryptionKey.Arn

  RetroactiveBackfillFunction:
    Type: AWS::Lambda::Function
    Condition: RetroactiveTaggingEnabled
    DependsOn: RetroactiveLogGroup
    Properties:
      Role: !GetAtt LambdaExecutionRole.Arn
      FunctionName: !Sub ${LambdaFunctionName}-backfill
      Handler: index.handler
      Runtime: python3.13
      Timeout: 900
      MemorySize: 512
      KmsKeyArn: !GetAtt EncryptionKey.Arn
      Environment:
        Variables:
          MANAGEMENT_ACCOUNT_ID: !Ref ManagementAccountId
          TAG_READER_ROLE_NAME: !Ref TagReaderRoleName
          EXCLUDE_TAG_KEYS: !Ref ExcludeTagKeys
          MARKER_TAG_KEY: !Ref MarkerTagKey
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import json
          import logging
          import os

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          BATCH_SIZE = 20
          TIMEOUT_BUFFER_MS = 30000

          def get_partition(region):
              if region.startswith('cn-'):
                  return 'aws-cn'
              if region.startswith('us-gov-'):
                  return 'aws-us-gov'
              return 'aws'

          def fetch_account_tags():
              """Fetch account tags from Organizations via cross-account role."""
              sts = boto3.client('sts')
              mgmt_account = os.environ['MANAGEMENT_ACCOUNT_ID']
              role_name = os.environ['TAG_READER_ROLE_NAME']
              exclude_keys_str = os.environ.get('EXCLUDE_TAG_KEYS', '')
              exclude_keys = {k.strip() for k in exclude_keys_str.split(',') if k.strip()}

              caller = sts.get_caller_identity()
              account_id = caller['Account']
              region = os.environ.get('AWS_REGION', 'us-east-1')
              partition = get_partition(region)

              role_arn = f'arn:{partition}:iam::{mgmt_account}:role/{role_name}'
              assumed = sts.assume_role(
                  RoleArn=role_arn,
                  RoleSessionName='dynamic-account-tagging-backfill',
                  DurationSeconds=900
              )
              creds = assumed['Credentials']
              org_client = boto3.client(
                  'organizations',
                  aws_access_key_id=creds['AccessKeyId'],
                  aws_secret_access_key=creds['SecretAccessKey'],
                  aws_session_token=creds['SessionToken']
              )
              response = org_client.list_tags_for_resource(ResourceId=account_id)
              raw_tags = {t['Key']: t['Value'] for t in response.get('Tags', [])}
              tags = {k: v for k, v in raw_tags.items() if k not in exclude_keys and not k.startswith('aws:')}
              logger.info(f'Account {account_id} tags for backfill: {json.dumps(tags)}')
              return tags

          def handler(event, context):
              logger.info(f'RequestType: {event.get("RequestType")}')
              if event.get('RequestType') != 'Create':
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                      'Message': f'{event.get("RequestType")} — nothing to do',
                      'Tagged': '0', 'Skipped': '0', 'Failed': '0'
                  })
                  return

              try:
                  result = tag_existing_resources(context)
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, result)
              except Exception as e:
                  logger.error(f'Failed: {e}')
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                      'Message': f'Backfill completed with errors: {str(e)}',
                      'Tagged': '0', 'Skipped': '0', 'Failed': '0'
                  })

          def tag_existing_resources(context):
              marker_key = os.environ.get('MARKER_TAG_KEY', '').strip()

              tags = fetch_account_tags()
              if not tags:
                  return {'Message': 'No account tags found', 'Tagged': '0', 'Skipped': '0', 'Failed': '0'}

              skip_tagged = bool(marker_key)
              if skip_tagged:
                  logger.info(f'Backfill mode: skipping resources with tag key "{marker_key}"')
              else:
                  logger.info('Tag update mode: MarkerTagKey is empty — tagging ALL resources')

              client = boto3.client('resourcegroupstaggingapi')
              tagged_count = 0
              skipped_count = 0
              failed_count = 0
              timed_out = False
              pagination_token = ''

              while True:
                  remaining_ms = context.get_remaining_time_in_millis()
                  if remaining_ms < TIMEOUT_BUFFER_MS:
                      logger.warning(f'Approaching timeout ({remaining_ms}ms remaining). Stopping.')
                      timed_out = True
                      break

                  params = {'ResourcesPerPage': 100}
                  if pagination_token:
                      params['PaginationToken'] = pagination_token

                  response = client.get_resources(**params)
                  untagged_arns = []
                  for resource in response.get('ResourceTagMappingList', []):
                      arn = resource['ResourceARN']
                      if skip_tagged:
                          existing_keys = {t['Key'] for t in resource.get('Tags', [])}
                          if marker_key in existing_keys:
                              skipped_count += 1
                              continue
                      untagged_arns.append(arn)

                  for i in range(0, len(untagged_arns), BATCH_SIZE):
                      if context.get_remaining_time_in_millis() < TIMEOUT_BUFFER_MS:
                          logger.warning('Approaching timeout during tagging. Stopping.')
                          failed_count += len(untagged_arns) - i
                          timed_out = True
                          break
                      batch = untagged_arns[i:i + BATCH_SIZE]
                      try:
                          resp = client.tag_resources(ResourceARNList=batch, Tags=tags)
                          failures = resp.get('FailedResourcesMap', {})
                          tagged_count += len(batch) - len(failures)
                          failed_count += len(failures)
                          if failures:
                              for arn, err in failures.items():
                                  logger.warning(f'Failed to tag {arn}: {err}')
                      except Exception as e:
                          logger.error(f'Batch tagging failed: {e}')
                          failed_count += len(batch)

                  if timed_out:
                      break
                  pagination_token = response.get('PaginationToken', '')
                  if not pagination_token:
                      break

              message = 'Retroactive tagging complete'
              if timed_out:
                  message = 'Partially complete (approaching timeout). Redeploy to continue.'
              result = {
                  'Message': message,
                  'Tagged': str(tagged_count),
                  'Skipped': str(skipped_count),
                  'Failed': str(failed_count)
              }
              logger.info(f'Result: {json.dumps(result)}')
              return result

  TriggerRetroactiveTagging:
    Type: Custom::RetroactiveTagging
    Condition: RetroactiveTaggingEnabled
    Properties:
      ServiceToken: !GetAtt RetroactiveBackfillFunction.Arn

Outputs:
  LambdaFunctionArn:
    Description: ARN of the dynamic account tagging Lambda function
    Value: !GetAtt LambdaAutoTagging.Arn
  EncryptionKeyArn:
    Description: ARN of the KMS key
    Value: !GetAtt EncryptionKey.Arn
  EventBridgeRuleArn:
    Description: ARN of the EventBridge rule
    Value: !GetAtt EventBridgeRule.Arn
  DeadLetterQueueArn:
    Description: ARN of the dead-letter queue
    Value: !GetAtt DeadLetterQueue.Arn
  DeadLetterQueueUrl:
    Description: URL of the dead-letter queue
    Value: !Ref DeadLetterQueue
  TagSource:
    Description: Where tags are sourced from
    Value: !Sub 'Account tags via Organizations API (management account ${ManagementAccountId})'
  BackfillStatus:
    Condition: RetroactiveTaggingEnabled
    Description: Result of the retroactive tagging backfill
    Value: !GetAtt TriggerRetroactiveTagging.Message
  BackfillResourcesTagged:
    Condition: RetroactiveTaggingEnabled
    Description: Number of existing resources tagged by the backfill
    Value: !GetAtt TriggerRetroactiveTagging.Tagged
  BackfillResourcesSkipped:
    Condition: RetroactiveTaggingEnabled
    Description: Number of existing resources skipped (already tagged)
    Value: !GetAtt TriggerRetroactiveTagging.Skipped
