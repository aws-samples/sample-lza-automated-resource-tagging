# Resource Tagging Automation for Landing Zone Accelerator on AWS

AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Lightweight LZA adaptation of aws-samples/resource-tagging-automation.
  Relies on the existing AWS Control Tower organization trail for EventBridge
  events. Deploys EventBridge rule, Lambda, KMS, DLQ, and IAM only — no
  per-account CloudTrail trail or S3 bucket. Supports 30+ resource types
  with per-account tag customization via LZA cloudFormationStacks.

Parameters:
  AutomationTags:
    Type: String
    Default: ''
    Description: >
      JSON string of tags to apply to new resources.
      Example: {"BillingCode": "PROD-001", "CostCenter": "CC-PROD", "Department": "Engineering"}

  LambdaAutoTaggingFunctionName:
    Type: String
    Default: resource-tagging-automation-function
    Description: Name of the Lambda function

  EventBridgeRuleName:
    Type: String
    Default: resource-tagging-automation-rules
    Description: Name of the EventBridge rule

Resources:

  # ============================================================
  # KMS — encryption for Lambda CloudWatch Logs and environment variables
  # ============================================================

  EncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Encryption key for resource tagging automation (Lambda logs and environment variables)
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableRootAccountAccess
            Effect: Allow
            Principal:
              AWS: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:root
            Action: kms:*
            Resource: '*'
          - Sid: AllowCloudWatchLogsEncrypt
            Effect: Allow
            Principal:
              Service: !Sub logs.${AWS::Region}.amazonaws.com
            Action:
              - kms:Encrypt*
              - kms:Decrypt*
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
            Resource: '*'
            Condition:
              ArnLike:
                kms:EncryptionContext:aws:logs:arn: !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${LambdaAutoTaggingFunctionName}
          - Sid: AllowCloudWatchLogsDescribeKey
            Effect: Allow
            Principal:
              Service: !Sub logs.${AWS::Region}.amazonaws.com
            Action:
              - kms:DescribeKey
            Resource: '*'
          - Sid: AllowLambdaEnvVarEncrypt
            Effect: Allow
            Principal:
              AWS: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:root
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:GenerateDataKey*
              - kms:CreateGrant
              - kms:DescribeKey
            Resource: '*'
            Condition:
              StringEquals:
                kms:ViaService: !Sub lambda.${AWS::Region}.amazonaws.com

  EncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/resource-tagging-automation-key
      TargetKeyId: !Ref EncryptionKey

  # ============================================================
  # Lambda CloudWatch Log Group — encrypted with KMS
  # ============================================================

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${LambdaAutoTaggingFunctionName}
      RetentionInDays: 90
      KmsKeyId: !GetAtt EncryptionKey.Arn

  # ============================================================
  # SQS Dead-Letter Queue — captures failed Lambda invocations
  # ============================================================

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${LambdaAutoTaggingFunctionName}-dlq
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: !GetAtt EncryptionKey.Arn

  DeadLetterQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref DeadLetterQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowLambdaServiceSendMessage
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt DeadLetterQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Sub arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:${LambdaAutoTaggingFunctionName}

  DeadLetterQueueAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${LambdaAutoTaggingFunctionName}-dlq-alarm
      AlarmDescription: Alarm when failed tagging events land in the dead-letter queue
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt DeadLetterQueue.QueueName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  # ============================================================
  # IAM Role — least-privilege tagging permissions
  # ============================================================

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: resource-tagging-automation-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: TaggingAPI
                Effect: Allow
                Action:
                  - tag:TagResources
                Resource: '*'
                Condition:
                  StringEquals:
                    aws:PrincipalAccount: !Ref AWS::AccountId
              - Sid: EC2Tagging
                Effect: Allow
                Action:
                  - ec2:CreateTags
                  - ec2:DescribeVolumes
                  - ec2:DescribeNatGateways
                  - ec2:DescribeInternetGateways
                  - ec2:DescribeVpcEndpoints
                Resource: '*'
                Condition:
                  StringEquals:
                    aws:PrincipalAccount: !Ref AWS::AccountId
              - Sid: ServiceTagging
                Effect: Allow
                Action:
                  - dynamodb:TagResource
                  - lambda:TagResource
                  - lambda:ListTags
                  - s3:GetBucketTagging
                  - s3:PutBucketTagging
                  - rds:AddTagsToResource
                  - sns:TagResource
                  - sqs:TagQueue
                  - sqs:ListQueueTags
                  - es:AddTags
                  - kms:TagResource
                  - kms:ListResourceTags
                  - elasticfilesystem:TagResource
                  - elasticloadbalancing:AddTags
                  - redshift:CreateTags
                  - redshift-serverless:TagResource
                  - sagemaker:AddTags
                  - ecs:TagResource
                  - kafka:TagResource
                  - logs:TagLogGroup
                  - logs:TagResource
                  - cloudwatch:TagResource
                  - mq:CreateTags
                  - secretsmanager:TagResource
                  - states:TagResource
                  - kinesis:AddTagsToStream
                  - apigateway:POST
                  - apigateway:PUT
                  - events:TagResource
                  - codebuild:UpdateProject
                  - codepipeline:TagResource
                  - glue:TagResource
                  - elasticache:AddTagsToResource
                  - ecr:TagResource
                Resource: '*'
                Condition:
                  StringEquals:
                    aws:PrincipalAccount: !Ref AWS::AccountId
              - Sid: DLQAccess
                Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt DeadLetterQueue.Arn

  # ============================================================
  # Lambda — tags resources on creation
  # ============================================================

  LambdaAutoTagging:
    Type: AWS::Lambda::Function
    DependsOn: LambdaLogGroup
    Properties:
      Role: !GetAtt LambdaExecutionRole.Arn
      FunctionName: !Ref LambdaAutoTaggingFunctionName
      Handler: index.main
      Runtime: python3.13
      Timeout: 300
      MemorySize: 256
      ReservedConcurrentExecutions: 10
      KmsKeyArn: !GetAtt EncryptionKey.Arn
      DeadLetterConfig:
        TargetArn: !GetAtt DeadLetterQueue.Arn
      Environment:
        Variables:
          tags: !Ref AutomationTags
      Code:
        ZipFile: |
          import boto3
          import os
          import json
          import logging
          from datetime import datetime, timezone

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          tagging_client = boto3.client('resourcegroupstaggingapi')

          # Allowlist of valid event sources to prevent code injection via globals()
          VALID_SOURCES = {
              'aws.ec2', 'aws.lambda', 'aws.ecs', 'aws.sagemaker', 'aws.s3',
              'aws.elasticfilesystem', 'aws.rds', 'aws.dynamodb', 'aws.elasticache',
              'aws.redshift', 'aws.redshift-serverless', 'aws.neptune',
              'aws.elasticloadbalancing', 'aws.apigateway', 'aws.es', 'aws.kafka',
              'aws.kinesis', 'aws.glue', 'aws.sns', 'aws.sqs', 'aws.states',
              'aws.events', 'aws.kms', 'aws.secretsmanager', 'aws.logs',
              'aws.monitoring', 'aws.amazonmq', 'aws.codebuild', 'aws.codepipeline',
              'aws.ecr',
          }

          def get_partition(region):
              """Return the ARN partition for the given region."""
              if region.startswith('cn-'):
                  return 'aws-cn'
              if region.startswith('us-gov-'):
                  return 'aws-us-gov'
              return 'aws'

          def get_identity(event):
              """Extract the IAM identity that created the resource from CloudTrail."""
              try:
                  identity = event['detail']['userIdentity']
                  if identity.get('type') == 'AssumedRole':
                      arn = identity.get('arn', '')
                      return arn.split('/')[-1] if '/' in arn else arn
                  elif identity.get('type') == 'IAMUser':
                      return identity.get('userName', 'unknown')
                  elif identity.get('type') == 'Root':
                      return 'root'
                  elif identity.get('type') == 'FederatedUser':
                      return identity.get('principalId', '').split(':')[-1]
                  return identity.get('principalId', 'unknown')
              except Exception:
                  return 'unknown'

          def build_arn(partition, service, region, account, resource):
              """Build a standard ARN with partition awareness."""
              return f'arn:{partition}:{service}:{region}:{account}:{resource}'

          # ---- Compute ----

          def aws_ec2(event, partition):
              arnList = []
              account = event['account']
              region = event['region']
              detail = event['detail']
              name = detail['eventName']

              if name == 'RunInstances':
                  ec2 = boto3.resource('ec2')
                  for item in detail['responseElements']['instancesSet']['items']:
                      iid = item['instanceId']
                      arnList.append(build_arn(partition, 'ec2', region, account, f'instance/{iid}'))
                      try:
                          instance = ec2.Instance(iid)
                          for vol in instance.volumes.all():
                              arnList.append(build_arn(partition, 'ec2', region, account, f'volume/{vol.id}'))
                      except Exception as e:
                          logger.warning(f'Could not get volumes for {iid}: {e}')

              elif name == 'CreateVolume':
                  vid = detail['responseElements']['volumeId']
                  arnList.append(build_arn(partition, 'ec2', region, account, f'volume/{vid}'))

              elif name == 'AllocateAddress':
                  arnList.append(build_arn(partition, 'ec2', region, account, f'elastic-ip/{detail["responseElements"]["allocationId"]}'))

              elif name == 'CreateNatGateway':
                  ngw = detail['responseElements']['CreateNatGatewayResponse']['natGateway']['natGatewayId']
                  arnList.append(build_arn(partition, 'ec2', region, account, f'natgateway/{ngw}'))

              elif name == 'CreateInternetGateway':
                  igw = detail['responseElements']['internetGateway']['internetGatewayId']
                  arnList.append(build_arn(partition, 'ec2', region, account, f'internet-gateway/{igw}'))

              elif name == 'CreateVpcEndpoint':
                  vpce = detail['responseElements']['CreateVpcEndpointResponse']['vpcEndpoint']['vpcEndpointId']
                  arnList.append(build_arn(partition, 'ec2', region, account, f'vpc-endpoint/{vpce}'))

              elif name == 'CreateTransitGateway':
                  tgw = detail['responseElements']['CreateTransitGatewayResponse']['transitGateway']['transitGatewayId']
                  arnList.append(build_arn(partition, 'ec2', region, account, f'transit-gateway/{tgw}'))

              elif name == 'CreateSecurityGroup':
                  sgid = detail['responseElements']['groupId']
                  arnList.append(build_arn(partition, 'ec2', region, account, f'security-group/{sgid}'))

              return arnList

          def aws_lambda(event, partition):
              arnList = []
              resp = event['detail']['responseElements']
              if resp and event['detail']['eventName'] == 'CreateFunction20150331':
                  arnList.append(resp['functionArn'])
              return arnList

          def aws_ecs(event, partition):
              arnList = []
              if event['detail']['eventName'] == 'CreateCluster':
                  arnList.append(event['detail']['responseElements']['cluster']['clusterArn'])
              elif event['detail']['eventName'] == 'CreateService':
                  arnList.append(event['detail']['responseElements']['service']['serviceArn'])
              return arnList

          def aws_sagemaker(event, partition):
              arnList = []
              name = event['detail']['eventName']
              resp = event['detail']['responseElements']
              mapping = {
                  'CreateNotebookInstance': 'notebookInstanceArn',
                  'CreateProcessingJob': 'processingJobArn',
                  'CreateEndpoint': 'endpointArn',
                  'CreateDomain': 'domainArn',
                  'CreateModel': 'modelArn',
                  'CreateLabelingJob': 'labelingJobArn',
                  'CreateTrainingJob': 'trainingJobArn',
                  'CreateTransformJob': 'transformJobArn',
                  'CreateUserProfile': 'userProfileArn',
                  'CreateWorkteam': 'workteamArn',
              }
              if name in mapping and resp:
                  arnList.append(resp[mapping[name]])
              return arnList

          # ---- Storage ----

          def aws_s3(event, partition):
              arnList = []
              if event['detail']['eventName'] == 'CreateBucket':
                  bucket = event['detail']['requestParameters']['bucketName']
                  arnList.append(f'arn:{partition}:s3:::{bucket}')
              return arnList

          def aws_elasticfilesystem(event, partition):
              arnList = []
              if event['detail']['eventName'] == 'CreateMountTarget':
                  account = event['account']
                  region = event['region']
                  fsid = event['detail']['responseElements']['fileSystemId']
                  arnList.append(build_arn(partition, 'elasticfilesystem', region, account, f'file-system/{fsid}'))
              return arnList

          # ---- Database ----

          def aws_rds(event, partition):
              arnList = []
              name = event['detail']['eventName']
              resp = event['detail']['responseElements']
              if name == 'CreateDBInstance' and resp:
                  arnList.append(resp['dBInstanceArn'])
              elif name == 'CreateDBCluster' and resp:
                  arnList.append(resp['dBClusterArn'])
              return arnList

          def aws_dynamodb(event, partition):
              arnList = []
              if event['detail']['eventName'] == 'CreateTable':
                  arnList.append(event['detail']['responseElements']['tableDescription']['tableArn'])
              return arnList

          def aws_elasticache(event, partition):
              arnList = []
              name = event['detail']['eventName']
              resp = event['detail']['responseElements']
              if name == 'CreateCacheCluster' and resp:
                  arnList.append(resp.get('aRN', resp.get('arn', '')))
              elif name == 'CreateReplicationGroup' and resp:
                  arnList.append(resp.get('aRN', resp.get('arn', '')))
              return [a for a in arnList if a]

          def aws_redshift(event, partition):
              arnList = []
              if event['detail']['eventName'] == 'CreateCluster':
                  account = event['account']
                  region = event['region']
                  cid = event['detail']['requestParameters']['clusterIdentifier']
                  arnList.append(build_arn(partition, 'redshift', region, account, f'cluster:{cid}'))
              return arnList

          def aws_redshift_serverless(event, partition):
              arnList = []
              name = event['detail']['eventName']
              resp = event['detail']['responseElements']
              if name == 'CreateWorkgroup':
                  arnList.append(resp['workgroup']['workgroupArn'])
              elif name == 'CreateNamespace':
                  arnList.append(resp['namespace']['namespaceArn'])
              return arnList

          def aws_neptune(event, partition):
              arnList = []
              name = event['detail']['eventName']
              resp = event['detail']['responseElements']
              if name == 'CreateDBCluster' and resp:
                  arnList.append(resp.get('dBClusterArn', ''))
              elif name == 'CreateDBInstance' and resp:
                  arnList.append(resp.get('dBInstanceArn', ''))
              return [a for a in arnList if a]

          # ---- Networking ----

          def aws_elasticloadbalancing(event, partition):
              arnList = []
              if event['detail']['eventName'] == 'CreateLoadBalancer':
                  resp = event['detail']['responseElements']
                  if 'loadBalancers' in resp:
                      for lb in resp['loadBalancers']:
                          arnList.append(lb['loadBalancerArn'])
              return arnList

          def aws_apigateway(event, partition):
              arnList = []
              region = event['region']
              name = event['detail']['eventName']
              resp = event['detail']['responseElements']
              if name == 'CreateRestApi' and resp:
                  api_id = resp.get('id', '')
                  if api_id:
                      arnList.append(f'arn:{partition}:apigateway:{region}::/restapis/{api_id}')
              elif name == 'CreateApi' and resp:
                  api_id = resp.get('apiId', '')
                  if api_id:
                      arnList.append(f'arn:{partition}:apigateway:{region}::/apis/{api_id}')
              return arnList

          # ---- Analytics ----

          def aws_es(event, partition):
              arnList = []
              if event['detail']['eventName'] == 'CreateDomain':
                  arnList.append(event['detail']['responseElements']['domainStatus']['aRN'])
              return arnList

          def aws_kafka(event, partition):
              arnList = []
              if event['detail']['eventName'] == 'CreateClusterV2':
                  arnList.append(event['detail']['responseElements']['clusterArn'])
              return arnList

          def aws_kinesis(event, partition):
              arnList = []
              if event['detail']['eventName'] == 'CreateStream':
                  account = event['account']
                  region = event['region']
                  stream = event['detail']['requestParameters']['streamName']
                  arnList.append(build_arn(partition, 'kinesis', region, account, f'stream/{stream}'))
              return arnList

          def aws_glue(event, partition):
              arnList = []
              account = event['account']
              region = event['region']
              name = event['detail']['eventName']
              req = event['detail']['requestParameters']
              if name == 'CreateJob':
                  arnList.append(build_arn(partition, 'glue', region, account, f'job/{req["name"]}'))
              elif name == 'CreateCrawler':
                  arnList.append(build_arn(partition, 'glue', region, account, f'crawler/{req["name"]}'))
              elif name == 'CreateDatabase':
                  db = req.get('databaseInput', {}).get('name', '')
                  if db:
                      arnList.append(build_arn(partition, 'glue', region, account, f'database/{db}'))
              return arnList

          # ---- Integration ----

          def aws_sns(event, partition):
              arnList = []
              if event['detail']['eventName'] == 'CreateTopic':
                  account = event['account']
                  region = event['region']
                  topic = event['detail']['requestParameters']['name']
                  arnList.append(build_arn(partition, 'sns', region, account, topic))
              return arnList

          def aws_sqs(event, partition):
              arnList = []
              if event['detail']['eventName'] == 'CreateQueue':
                  account = event['account']
                  region = event['region']
                  queue = event['detail']['requestParameters']['queueName']
                  arnList.append(build_arn(partition, 'sqs', region, account, queue))
              return arnList

          def aws_states(event, partition):
              arnList = []
              if event['detail']['eventName'] == 'CreateStateMachine':
                  resp = event['detail']['responseElements']
                  if resp:
                      arnList.append(resp['stateMachineArn'])
              return arnList

          def aws_events(event, partition):
              arnList = []
              if event['detail']['eventName'] == 'CreateEventBus':
                  resp = event['detail']['responseElements']
                  if resp:
                      arnList.append(resp['eventBusArn'])
              return arnList

          # ---- Security ----

          def aws_kms(event, partition):
              arnList = []
              if event['detail']['eventName'] == 'CreateKey':
                  arnList.append(event['detail']['responseElements']['keyMetadata']['arn'])
              return arnList

          def aws_secretsmanager(event, partition):
              arnList = []
              if event['detail']['eventName'] == 'CreateSecret':
                  arnList.append(event['detail']['responseElements']['aRN'])
              return arnList

          # ---- Monitoring ----

          def aws_logs(event, partition):
              arnList = []
              if event['detail']['eventName'] == 'CreateLogGroup':
                  account = event['account']
                  region = event['region']
                  lg = event['detail']['requestParameters']['logGroupName']
                  arnList.append(build_arn(partition, 'logs', region, account, f'log-group:{lg}'))
              return arnList

          def aws_monitoring(event, partition):
              arnList = []
              if event['detail']['eventName'] == 'PutMetricAlarm':
                  account = event['account']
                  region = event['region']
                  alarm = event['detail']['requestParameters']['alarmName']
                  arnList.append(build_arn(partition, 'cloudwatch', region, account, f'alarm:{alarm}'))
              return arnList

          # ---- Messaging ----

          def aws_amazonmq(event, partition):
              arnList = []
              if event['detail']['eventName'] == 'CreateBroker':
                  arnList.append(event['detail']['responseElements']['brokerArn'])
              return arnList

          # ---- Developer Tools ----

          def aws_codebuild(event, partition):
              arnList = []
              if event['detail']['eventName'] == 'CreateProject':
                  resp = event['detail']['responseElements']
                  if resp and 'project' in resp:
                      arnList.append(resp['project']['arn'])
              return arnList

          def aws_codepipeline(event, partition):
              arnList = []
              if event['detail']['eventName'] == 'CreatePipeline':
                  resp = event['detail']['responseElements']
                  if resp and 'pipeline' in resp:
                      account = event['account']
                      region = event['region']
                      name = resp['pipeline']['name']
                      arnList.append(build_arn(partition, 'codepipeline', region, account, name))
              return arnList

          # ---- Container Registry ----

          def aws_ecr(event, partition):
              arnList = []
              if event['detail']['eventName'] == 'CreateRepository':
                  resp = event['detail']['responseElements']
                  if resp and 'repository' in resp:
                      arnList.append(resp['repository']['repositoryArn'])
              return arnList

          # ---- Handler dispatch map ----

          HANDLER_MAP = {
              'aws.ec2': aws_ec2,
              'aws.lambda': aws_lambda,
              'aws.ecs': aws_ecs,
              'aws.sagemaker': aws_sagemaker,
              'aws.s3': aws_s3,
              'aws.elasticfilesystem': aws_elasticfilesystem,
              'aws.rds': aws_rds,
              'aws.dynamodb': aws_dynamodb,
              'aws.elasticache': aws_elasticache,
              'aws.redshift': aws_redshift,
              'aws.redshift-serverless': aws_redshift_serverless,
              'aws.neptune': aws_neptune,
              'aws.elasticloadbalancing': aws_elasticloadbalancing,
              'aws.apigateway': aws_apigateway,
              'aws.es': aws_es,
              'aws.kafka': aws_kafka,
              'aws.kinesis': aws_kinesis,
              'aws.glue': aws_glue,
              'aws.sns': aws_sns,
              'aws.sqs': aws_sqs,
              'aws.states': aws_states,
              'aws.events': aws_events,
              'aws.kms': aws_kms,
              'aws.secretsmanager': aws_secretsmanager,
              'aws.logs': aws_logs,
              'aws.monitoring': aws_monitoring,
              'aws.amazonmq': aws_amazonmq,
              'aws.codebuild': aws_codebuild,
              'aws.codepipeline': aws_codepipeline,
              'aws.ecr': aws_ecr,
          }

          # ---- Main handler ----

          def main(event, context):
              logger.info(f'Event source: {event["source"]}, Event: {event["detail"]["eventName"]}')

              source = event['source']

              # Validate event source against allowlist
              if source not in VALID_SOURCES:
                  logger.warning(f'Unexpected event source: {source}')
                  return {'statusCode': 400, 'body': 'Unknown event source'}

              handler = HANDLER_MAP.get(source)
              if not handler:
                  logger.warning(f'No handler for source: {source}')
                  return {'statusCode': 200, 'body': 'No handler for this event source'}

              partition = get_partition(event['region'])

              try:
                  resARNs = handler(event, partition)
              except Exception as e:
                  logger.error(f'Handler for {source} failed: {e}')
                  return {'statusCode': 500, 'body': f'Handler error: {str(e)}'}

              if not resARNs:
                  logger.info('No resource ARNs to tag')
                  return {'statusCode': 200, 'body': 'No resources to tag'}

              # Filter out empty strings
              resARNs = [a for a in resARNs if a]

              # Build tag set: custom tags + metadata tags
              res_tags = {}
              if os.environ.get('tags'):
                  try:
                      res_tags = json.loads(os.environ['tags'])
                  except json.JSONDecodeError:
                      logger.error(f'Invalid tags JSON: {os.environ["tags"]}')

              # Add CreatedBy and CreatedDate metadata
              res_tags['CreatedBy'] = get_identity(event)
              res_tags['CreatedDate'] = event.get('detail', {}).get('eventTime', datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'))

              logger.info(f'Tagging {len(resARNs)} resource(s): {resARNs}')

              # Tag in batches of 20 (API limit)
              for i in range(0, len(resARNs), 20):
                  batch = resARNs[i:i+20]
                  try:
                      tagging_client.tag_resources(ResourceARNList=batch, Tags=res_tags)
                  except Exception as e:
                      logger.error(f'Failed to tag batch {batch}: {e}')

              return {'statusCode': 200, 'body': f'Tagged {len(resARNs)} resource(s)'}

  # ============================================================
  # EventBridge — filters resource creation events
  # ============================================================

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Triggers auto-tagging Lambda on resource creation events
      Name: !Ref EventBridgeRuleName
      EventPattern:
        detail-type:
          - AWS API Call via CloudTrail
        source:
          - aws.ec2
          - aws.elasticloadbalancing
          - aws.rds
          - aws.lambda
          - aws.s3
          - aws.dynamodb
          - aws.elasticfilesystem
          - aws.es
          - aws.sqs
          - aws.sns
          - aws.kms
          - aws.ecs
          - aws.redshift
          - aws.redshift-serverless
          - aws.sagemaker
          - aws.monitoring
          - aws.logs
          - aws.kafka
          - aws.amazonmq
          - aws.secretsmanager
          - aws.states
          - aws.kinesis
          - aws.apigateway
          - aws.events
          - aws.codebuild
          - aws.codepipeline
          - aws.glue
          - aws.neptune
          - aws.elasticache
          - aws.ecr
        detail:
          eventName:
            # EC2
            - RunInstances
            - CreateVolume
            - AllocateAddress
            - CreateNatGateway
            - CreateInternetGateway
            - CreateVpcEndpoint
            - CreateTransitGateway
            - CreateSecurityGroup
            # Lambda
            - CreateFunction20150331
            # ECS
            - CreateCluster
            - CreateService
            # SageMaker
            - CreateNotebookInstance
            - CreateProcessingJob
            - CreateEndpoint
            - CreateDomain
            - CreateModel
            - CreateLabelingJob
            - CreateTrainingJob
            - CreateTransformJob
            - CreateUserProfile
            - CreateWorkteam
            # Storage
            - CreateBucket
            - CreateMountTarget
            # Database
            - CreateDBInstance
            - CreateDBCluster
            - CreateTable
            - CreateCacheCluster
            - CreateReplicationGroup
            # Networking
            - CreateLoadBalancer
            - CreateRestApi
            - CreateApi
            # Analytics
            - CreateClusterV2
            - CreateStream
            - CreateJob
            - CreateCrawler
            - CreateDatabase
            # Integration
            - CreateTopic
            - CreateQueue
            - CreateStateMachine
            - CreateEventBus
            # Security
            - CreateKey
            - CreateSecret
            # Monitoring
            - CreateLogGroup
            - PutMetricAlarm
            # Messaging
            - CreateBroker
            # Redshift
            - CreateNamespace
            - CreateWorkgroup
            # Developer Tools
            - CreateProject
            - CreatePipeline
            # Container Registry
            - CreateRepository
      Targets:
        - Arn: !GetAtt LambdaAutoTagging.Arn
          Id: !Ref LambdaAutoTaggingFunctionName

  PermissionForEventsToInvokeLambda:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaAutoTaggingFunctionName
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt EventBridgeRule.Arn

Outputs:
  LambdaFunctionArn:
    Description: ARN of the auto-tagging Lambda function
    Value: !GetAtt LambdaAutoTagging.Arn
  EncryptionKeyArn:
    Description: ARN of the KMS key used for Lambda log and environment variable encryption
    Value: !GetAtt EncryptionKey.Arn
  EventBridgeRuleArn:
    Description: ARN of the EventBridge rule
    Value: !GetAtt EventBridgeRule.Arn
  DeadLetterQueueArn:
    Description: ARN of the dead-letter queue for failed tagging invocations
    Value: !GetAtt DeadLetterQueue.Arn
  DeadLetterQueueUrl:
    Description: URL of the dead-letter queue for reprocessing failed events
    Value: !Ref DeadLetterQueue
