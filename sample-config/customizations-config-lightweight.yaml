# Sample LZA customizations-config.yaml — Per-account deployment (lightweight, no per-account trail)
#
# This uses cloudFormationStacks (not cloudFormationStackSets) to enable
# per-account tag customization. Each account gets its own stack entry
# with unique tags passed via the AutomationTags parameter.
#
# This configuration uses the lightweight template, which relies on the
# existing AWS Control Tower organization trail for EventBridge events
# instead of deploying a per-account CloudTrail trail. See the README
# for trade-offs between the standard and lightweight templates.
#
# UPDATE: Before deploying, replace all <placeholder> values with your
# actual account names, regions, and tag values.
#
# For OU-level deployment with the same tags, see customizations-config-lightweight-stackset.yaml.

customizations:
  cloudFormationStacks:
    # ---- Production Account ----
    # UPDATE: Replace 'ProductionAccount' with your account name from accounts-config.yaml
    - deploymentTargets:
        accounts:
          - ProductionAccount
      name: ResourceTaggingAutomation-Production
      description: Auto-tagging for Production account (lightweight, no per-account trail)
      regions:                        # UPDATE: list ALL governed regions where users create resources
        - us-east-1
        - us-east-2
        - us-west-1
        - us-west-2
      runOrder: 1
      template: customizations/resource-tagging-automation-lightweight.yaml
      terminationProtection: false
      parameters:
        - name: AutomationTags
          value: '{"BillingCode": "PROD-001", "CostCenter": "CC-PROD", "Department": "Engineering", "Environment": "Production"}'

    # ---- Staging Account ----
    # UPDATE: Replace 'StagingAccount' with your account name from accounts-config.yaml
    - deploymentTargets:
        accounts:
          - StagingAccount
      name: ResourceTaggingAutomation-Staging
      description: Auto-tagging for Staging account (lightweight, no per-account trail)
      regions:                        # UPDATE: list ALL governed regions
        - us-east-1
        - us-east-2
        - us-west-1
        - us-west-2
      runOrder: 1
      template: customizations/resource-tagging-automation-lightweight.yaml
      terminationProtection: false
      parameters:
        - name: AutomationTags
          value: '{"BillingCode": "STG-001", "CostCenter": "CC-STAGING", "Department": "QA", "Environment": "Staging"}'

    # ---- Development Account ----
    # UPDATE: Replace 'DevAccount' with your account name from accounts-config.yaml
    - deploymentTargets:
        accounts:
          - DevAccount
      name: ResourceTaggingAutomation-Dev
      description: Auto-tagging for Development account (lightweight, no per-account trail)
      regions:                        # UPDATE: list ALL governed regions
        - us-east-1
        - us-east-2
        - us-west-1
        - us-west-2
      runOrder: 1
      template: customizations/resource-tagging-automation-lightweight.yaml
      terminationProtection: false
      parameters:
        - name: AutomationTags
          value: '{"BillingCode": "DEV-001", "CostCenter": "CC-DEV", "Department": "Engineering", "Environment": "Development"}'
